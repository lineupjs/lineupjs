<!doctype html>
<html>
  <head lang="en">
    <meta charset="UTF-8" />
    <title>LineUp – Number Filter Precision Mode</title>

    <link href="./LineUpJS.css" rel="stylesheet" />
    <link href="./demo.css" rel="stylesheet" />
    <style>
      p {
        font-family: sans-serif;
        margin: 0.5em 1em;
        color: #444;
      }
    </style>
  </head>
  <body>
    <p>
      <strong>Precision mode enabled:</strong> click the min/max filter handles once to open the exact-value editor.
      Dragging is disabled in this mode.
    </p>
    <script src="https://d3js.org/d3.v4.min.js"></script>
    <script src="./LineUpJS.js"></script>

    <script>
      window.onload = function () {
        const arr = [];
        for (let i = 0; i < 100; ++i) {
          arr.push({
            a: Math.random() * 10,
            b: Math.random() * 10,
            c: Math.random() * 10,
            d: Math.random() * 10,
            e: Math.random() * 10,
          });
        }
        const builder = LineUpJS.builder(arr);
        builder.deriveColumns().enableNumberFilterPrecisionMode();
        builder.buildTaggle(document.body);
      };
    </script>
  </body>
</html>
